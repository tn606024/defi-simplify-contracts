[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
cache_path = "cache"

solc_version = "0.8.28"
auto_detect_solc = false
evm_version = "prague"
optimizer = true
optimizer_runs = 200
via_ir = true
bytecode_hash = "ipfs"
use_literal_content = true

gas_reports = ["*"]

[profile.default.fuzz]
runs = 512

[profile.default.invariant]
runs = 256
depth = 128
fail_on_revert = true

[profile.ci.fuzz]
runs = 10_000

[profile.ci.invariant]
runs = 512
depth = 256
fail_on_revert = true
